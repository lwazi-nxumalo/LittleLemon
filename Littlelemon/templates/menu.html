{% extends 'base.html' %}
{% load static %}
{% block content %}
<h1>Menu</h1>
<div class="menu-grid">
    {% for item in menu %}
    <div class="menu-card">
        {% if item.image %}
        <img src="{{ item.image.url }}" alt="{{ item.title }}">
        {% else %}
        <div class="menu-card-placeholder"></div>
        {% endif %}
        <div class="menu-card-body">
            <h3>{{ item.title }}</h3>
            <span class="menu-card-price">${{ item.price }}</span>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
